<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SaaS Verify WeChat Console</title>
    <link rel="stylesheet" href="/console/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>SaaS Verify WeChat Console</h1>
        <p>配置公众号接入，查看平台账号的微信验证状态。</p>
      </div>
      <div class="token-box">
        <label for="adminToken">Admin Token</label>
        <input id="adminToken" type="password" autocomplete="current-password" placeholder="WVB_ADMIN_TOKEN">
        <button id="saveTokenButton" type="button">保存到本机浏览器</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel config-panel">
        <div class="panel-heading">
          <div>
            <h2>公众号配置</h2>
            <p>长期保存到服务端配置文件。</p>
          </div>
          <button id="refreshButton" type="button">刷新</button>
        </div>

        <form id="tenantForm" class="form-grid">
          <label>
            Tenant ID
            <input id="tenantId" name="tenantId" required placeholder="demo-tenant">
          </label>
          <label>
            Host Client ID
            <input id="clientId" name="clientId" required placeholder="demo-client">
          </label>
          <label>
            Host Client Secret
            <input id="clientSecret" name="clientSecret" required placeholder="仅服务端使用">
          </label>
          <label>
            微信 Token
            <input id="wechatToken" name="wechatToken" required placeholder="公众号服务器配置 Token">
          </label>
          <label>
            微信 AppID
            <input id="wechatAppId" name="wechatAppId" required placeholder="wx...">
          </label>
          <label>
            微信 AppSecret
            <input id="wechatAppSecret" name="wechatAppSecret" required placeholder="公众号开发者密码">
          </label>
          <button class="primary span-2" type="submit">保存配置</button>
        </form>

        <div class="tenant-list">
          <h3>已配置租户</h3>
          <div id="tenantList" class="table-like"></div>
        </div>
      </section>

      <section class="panel guide-panel">
        <h2>接入教程</h2>
        <p>
          新版公众号配置已迁移到微信开发者平台。先按独立教程拿到 AppID、AppSecret、
          API IP 白名单和消息推送配置，再回到这里保存。
        </p>
        <a class="doc-link-card" href="/console/wechat-setup.html" target="_blank" rel="noreferrer">
          <img src="/console/wechat-onboarding-flow.png" alt="微信公众号接入流程图">
          打开图文接入教程
          <span>包含新版入口、红框示意、Token 规则和本项目回填流程。</span>
        </a>
        <div class="webhook-preview">
          <strong>当前租户 Webhook URL</strong>
          <code id="webhookUrl">/wechat/{tenantId}/webhook</code>
        </div>
        <div class="copy-row">
          <input id="publicBaseUrl" placeholder="https://your-domain.com" value="">
          <button id="copyWebhookButton" type="button">复制完整 Webhook URL</button>
        </div>
      </section>

      <section class="panel status-panel">
        <div class="panel-heading">
          <div>
            <h2>用户验证状态</h2>
            <p>按租户和平台账号查询已绑定状态。</p>
          </div>
        </div>

        <form id="statusForm" class="query-row">
          <input id="queryTenantId" required placeholder="tenantId">
          <input id="queryPlatformAccountId" placeholder="平台账号，可留空查看最近绑定">
          <button class="primary" type="submit">查询</button>
        </form>

        <div id="bindingResults" class="table-like"></div>
      </section>

      <section class="panel attempts-panel">
        <div class="panel-heading">
          <div>
            <h2>最近验证记录</h2>
            <p>排查发错账号、过期会话和绑定冲突。</p>
          </div>
          <button id="refreshAttemptsButton" type="button">刷新记录</button>
        </div>
        <div id="attemptResults" class="table-like"></div>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="/console/app.js"></script>
  </body>
</html>
